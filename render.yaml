services:
  # Web Application
  - type: web
    name: prestoliv
    env: node
    rootDir: web
    buildCommand: "npm ci && npm run build"
    startCommand: "npx next start -p $PORT"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
